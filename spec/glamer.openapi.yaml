openapi: 3.0.3
info:
  version: '1.0'
  title: Glamer Backend API
  description: API for managing users and stylists in the Glamer application.
paths:
  /session:
    head:
      summary: Check session status
      description: Validates the session cookie.
      security:
        - cookieAuth: []
      responses:
        '204':
          description: Session is valid.
        '401':
          description: Unauthorized.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    post:
      summary: Generate session cookie
      description: Creates a session cookie for the client browser using a Firebase ID token.
      security:
        - bearerAuth: []
      responses:
        '201':
          description: Session cookie created successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SessionResponse'
        '400':
          description: Bad request.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: User not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    delete:
      summary: Remove session cookie
      description: Removes the session cookie from the client browser.
      responses:
        '204':
          description: Session cookie removed successfully.
        '500':
          description: Internal server error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /me/:
    put:
      summary: Update user profile
      description: Updates the user's profile information such as name and bio.
      security:
        - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              required: null
              $ref: '#/components/schemas/UserRequest'
      responses:
        '204':
          description: Profile updated successfully.
        '400':
          description: Bad request.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    get:
      summary: Get user profile
      description: Retrieves the user's profile information such as name and bio.
      security:
        - cookieAuth: []
      responses:
        '200':
          description: User profile retrieved successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResponse'
        '401':
          description: Unauthorized.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    delete:
      description: Delete user account
      summary: Delete user account
      security:
        - cookieAuth: []
      responses:
        '204':
          description: User account deleted successfully.
        '401':
          description: Unauthorized.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /me/register:
    post:
      tags:
        - self
      summary: Register a new user
      description: Registers a new user with the provided ID token and user details.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserRequest'
      responses:
        '201':
          description: User registered successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResponse'
        '400':
          description: Bad request.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /me/settings/notifications:
    put:
      summary: Update notification/email preferences
      description: Updates the user's notification and email preferences.
      security:
        - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserNotificationPreferencesRequest'
      responses:
        '204':
          description: Preferences updated successfully.
        '400':
          description: Bad request.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    get:
      summary: Get notification/email preferences
      description: Retrieves the user's notification and email preferences.
      security:
        - cookieAuth: []
      responses:
        '200':
          description: Preferences retrieved successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserNotificationPreferencesResponse'
        '401':
          description: Unauthorized.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /me/settings/phone-number:
    get:
      summary: Get user's phone number
      description: Retrieves the phone number associated with the authenticated user's account. Each user can have only one phone number for SMS messaging.
      security:
        - cookieAuth: []
      responses:
        '200':
          description: Phone number retrieved successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PhoneNumberResponse'
        '401':
          description: Unauthorized.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: No phone number configured.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    post:
      summary: Set or update phone number
      description: Sets or updates the user's phone number for SMS messaging. Only one phone number is allowed per user. The phone number must be verified via SMS before it can be used.
      security:
        - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PhoneNumberCreateRequest'
      responses:
        '201':
          description: Phone number created successfully. A verification OTP has been sent.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PhoneNumberResponse'
        '400':
          description: Bad request.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    put:
      summary: Update phone number
      description: Updates the user's phone number. A new verification OTP will be sent to the new number.
      security:
        - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PhoneNumberCreateRequest'
      responses:
        '200':
          description: Phone number updated successfully. A verification OTP has been sent to the new number.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PhoneNumberResponse'
        '400':
          description: Bad request.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    delete:
      summary: Delete phone number
      description: Removes the phone number from the user's account. SMS messaging will no longer be available.
      security:
        - cookieAuth: []
      responses:
        '204':
          description: Phone number deleted successfully.
        '401':
          description: Unauthorized.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /me/settings/timezone:
    patch:
      summary: Update user's timezone
      description: Updates the timezone preference for the authenticated user. The timezone must be a valid IANA timezone identifier.
      security:
        - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateTimezoneRequest'
      responses:
        '204':
          description: Timezone updated successfully.
        '400':
          description: Bad request (invalid timezone identifier).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /me/notifications:
    get:
      description: Get notifications
      summary: Get notifications for the current user
      security:
        - cookieAuth: []
      parameters:
        - name: status
          in: query
          required: false
          schema:
            type: string
            enum:
              - read
              - unread
          description: Filter notifications by status.
        - name: page
          in: query
          required: false
          schema:
            type: integer
            default: 1
          description: Page number for pagination.
        - name: page_size
          in: query
          required: false
          schema:
            type: integer
            default: 10
          description: Number of notifications per page.
      responses:
        '200':
          description: Notifications retrieved successfully.
          content:
            application/json:
              schema:
                properties:
                  meta:
                    $ref: '#/components/schemas/MetaResponse'
                  links:
                    $ref: '#/components/schemas/LinksResponse'
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/NotificationResponse'
        '401':
          description: Unauthorized.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /me/notifications/{id}/read:
    put:
      summary: Mark notification as read
      description: Marks a specific notification as read.
      security:
        - cookieAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: ID of the notification to mark as read.
      responses:
        '204':
          description: Notification marked as read successfully.
        '400':
          description: Bad request.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Notification not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /me/appointments:
    get:
      summary: Get my appointments
      description: Retrieves appointments for the authenticated user (client). Returns appointments where the user is the client.
      security:
        - cookieAuth: []
      parameters:
        - name: start_date
          in: query
          schema:
            type: string
            format: date
          description: Filter appointments starting from this date (inclusive). Format YYYY-MM-DD.
        - name: end_date
          in: query
          schema:
            type: string
            format: date
          description: Filter appointments ending on or before this date (inclusive). Format YYYY-MM-DD.
        - name: status
          in: query
          schema:
            type: array
            items:
              type: string
              enum:
                - requested
                - confirmed
                - completed
                - completed_auto
                - canceled_by_client
                - canceled_by_stylist
                - expired
                - no_show_client
                - no_show_stylist
          description: Filter by appointment status.
        - name: sort_by
          in: query
          schema:
            type: string
            enum:
              - start_time
              - end_time
            default: start_time
          description: Field to sort the results by.
        - name: sort_order
          in: query
          schema:
            type: string
            enum:
              - asc
              - desc
            default: asc
          description: Sort order (ascending or descending).
        - name: page
          in: query
          schema:
            type: integer
            minimum: 1
            default: 1
          description: Page number for pagination.
        - name: page_size
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 10
          description: Number of items per page.
      responses:
        '200':
          description: Appointments retrieved successfully.
          content:
            application/json:
              schema:
                properties:
                  meta:
                    $ref: '#/components/schemas/MetaResponse'
                  links:
                    $ref: '#/components/schemas/LinksResponse'
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/AppointmentResponse'
        '401':
          description: Unauthorized.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /me/devices:
    post:
      summary: Register a device token
      description: Registers or updates an FCM device token for the authenticated user to receive push notifications.
      security:
        - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DeviceTokenRequest'
      responses:
        '204':
          description: Device token registered successfully.
        '400':
          description: Bad request.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /me/devices/{token}:
    delete:
      summary: Unregister a device token
      description: Removes a specific FCM device token (e.g. on logout).
      security:
        - cookieAuth: []
      parameters:
        - name: token
          in: path
          required: true
          schema:
            type: string
          description: The FCM token to remove.
      responses:
        '204':
          description: Device token removed successfully.
        '401':
          description: Unauthorized.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /me/uploads/presign:
    post:
      summary: Request a presigned upload URL
      description: |
        Returns a short-lived presigned URL the client uses to upload a file
        directly to object storage. After uploading, the returned public_url can
        be registered (e.g. as a portfolio photo's storage_url).
      security:
        - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PresignUploadRequest'
      responses:
        '201':
          description: Presigned upload URL created successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PresignUploadResponse'
        '400':
          description: Invalid content type or file too large.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /me/reviews:
    get:
      summary: Get user's own reviews
      description: Retrieves reviews written by the authenticated user (only for clients).
      security:
        - cookieAuth: []
      parameters:
        - name: sort
          in: query
          schema:
            type: string
            enum:
              - newest
              - oldest
              - highest
              - lowest
            default: newest
          description: Sort order for reviews
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
            default: 20
          description: Number of reviews to return
        - name: offset
          in: query
          schema:
            type: integer
            minimum: 0
            default: 0
          description: Number of reviews to skip for pagination
      responses:
        '200':
          description: User's reviews retrieved successfully
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ReviewResponse'
        '401':
          description: Unauthorized.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /me/stylist/profile:
    put:
      summary: Update stylist profile
      description: Updates the stylist's profile information such as headline and bio.
      security:
        - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/StylistProfileRequest'
      responses:
        '204':
          description: Profile updated successfully.
        '400':
          description: Bad request.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    get:
      summary: Get stylist profile
      description: Retrieves the stylist's profile information such as headline and bio.
      security:
        - cookieAuth: []
      responses:
        '200':
          description: Stylist profile retrieved successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StylistProfileResponse'
        '401':
          description: Unauthorized.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /me/stylist/complete:
    post:
      summary: Complete stylist onboarding
      description: Validates that all onboarding requirements are met (profile basics, stylist type, a non-empty availability schedule, and at least one service), then persists onboardingCompleted=true and activates the stylist for bookings. Returns 400 if any requirement is unmet.
      security:
        - cookieAuth: []
      responses:
        '200':
          description: Onboarding completed successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: Onboarding completed successfully
                required:
                  - success
                  - message
        '400':
          description: Onboarding requirements not met
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /me/stylist/services:
    post:
      summary: Add a service
      description: Adds a new service for the stylist.
      security:
        - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ServiceRequest'
      responses:
        '201':
          description: Service added successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ServiceResponse'
        '400':
          description: Bad request.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    get:
      summary: Get services
      description: Retrieves the stylist's services.
      security:
        - cookieAuth: []
      responses:
        '200':
          description: Services retrieved successfully.
          content:
            application/json:
              schema:
                properties:
                  meta:
                    $ref: '#/components/schemas/MetaResponse'
                  links:
                    $ref: '#/components/schemas/LinksResponse'
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/ServiceResponse'
        '401':
          description: Unauthorized.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /me/stylist/services/{id}:
    delete:
      summary: Remove a service
      description: Removes a service by its ID.
      security:
        - cookieAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: ID of the service to remove.
      responses:
        '204':
          description: Service removed successfully.
        '400':
          description: Bad request.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    put:
      summary: Update a service
      description: Updates the details of an existing service.
      security:
        - cookieAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: ID of the service to update.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ServiceRequest'
      responses:
        '200':
          description: Service updated successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ServiceResponse'
        '400':
          description: Bad request.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /me/stylist/availability:
    put:
      summary: Configure availability calendar
      description: Configures the stylist's availability calendar.
      security:
        - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/WeeklyAvailability'
      responses:
        '204':
          description: Availability configured successfully.
        '400':
          description: Bad request.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    get:
      summary: Get availability calendar
      description: Retrieves the stylist's availability calendar.
      security:
        - cookieAuth: []
      responses:
        '200':
          description: Availability calendar retrieved successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WeeklyAvailability'
        '401':
          description: Unauthorized.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /me/stylist/time-off:
    post:
      summary: Add or update time-off
      description: Adds or updates a time-off entry for the stylist.
      security:
        - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TimeOffEntryRequest'
      responses:
        '201':
          description: Time-off added or updated successfully.
        '400':
          description: Bad request.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    get:
      summary: Get time-off entries
      description: Retrieves the stylist's time-off entries.
      security:
        - cookieAuth: []
      responses:
        '200':
          description: Time-off entries retrieved successfully.
          content:
            application/json:
              schema:
                properties:
                  meta:
                    $ref: '#/components/schemas/MetaResponse'
                  links:
                    $ref: '#/components/schemas/LinksResponse'
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/TimeOffEntryResponse'
        '401':
          description: Unauthorized.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /me/stylist/time-off/{id}:
    delete:
      summary: Remove time-off
      description: Removes a time-off entry by its ID.
      security:
        - cookieAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: ID of the time-off entry to remove.
      responses:
        '204':
          description: Time-off removed successfully.
        '400':
          description: Bad request.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /me/stylist/schedule-overrides:
    get:
      summary: Get schedule overrides
      description: Retrieves the stylist's schedule overrides (special dates that override weekly availability).
      security:
        - cookieAuth: []
      responses:
        '200':
          description: Schedule overrides retrieved successfully.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ScheduleOverride'
        '401':
          description: Unauthorized.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    post:
      summary: Add a schedule override
      description: Adds a new schedule override for a specific date.
      security:
        - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ScheduleOverrideRequest'
      responses:
        '201':
          description: Schedule override added successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ScheduleOverride'
        '400':
          description: Bad request.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /me/stylist/schedule-overrides/{date}:
    get:
      summary: Get a schedule override
      description: Retrieves a schedule override for a specific date.
      security:
        - cookieAuth: []
      parameters:
