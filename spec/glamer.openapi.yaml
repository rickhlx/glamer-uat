      responses:
        '204':
          description: Cart item removed successfully.
        '404':
          description: Cart or item not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /carts/{id}/checkout:
    post:
      summary: Checkout cart
      description: Converts cart items to actual appointments and processes payment.
      security:
        - cookieAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
