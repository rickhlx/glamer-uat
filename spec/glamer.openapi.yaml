    TimeSlot:
      type: object
      required:
        - start
        - end
      properties:
        start:
          type: string
          format: time
          description: Local wall-clock start time (HH:MM) in the stylist's timezone. No UTC offset; interpreted in the stylist's business timezone.
          example: '09:00'
        end:
          type: string
          format: time
          description: Local wall-clock end time (HH:MM) in the stylist's timezone. No UTC offset; interpreted in the stylist's business timezone.
          example: '17:00'
    WeeklyAvailability:
      type: object
      properties:
        timezone:
          type: string
          description: Stylist's IANA business timezone anchoring these hours. Settable on PUT (optional -- omit to leave the stored value unchanged) and echoed on GET. Invalid identifiers are rejected with 400. TimeSlot start/end are local wall-clock times interpreted in this zone.
          example: America/New_York
        monday:
          type: array
          items:
            $ref: '#/components/schemas/TimeSlot'
        tuesday:
          type: array
          items:
            $ref: '#/components/schemas/TimeSlot'
        wednesday:
          type: array
          items:
            $ref: '#/components/schemas/TimeSlot'
        thursday:
          type: array
          items:
            $ref: '#/components/schemas/TimeSlot'
        friday:
          type: array
          items:
            $ref: '#/components/schemas/TimeSlot'
        saturday:
          type: array
          items:
            $ref: '#/components/schemas/TimeSlot'
        sunday:
          type: array
          items:
            $ref: '#/components/schemas/TimeSlot'
      additionalProperties: false
      example:
        timezone: America/New_York
        monday:
          - start: '09:00'
            end: '12:00'
          - start: '13:00'
            end: '17:00'
        tuesday:
          - start: '10:00'
            end: '15:00'
        wednesday: []
        thursday:
          - start: '09:00'
            end: '12:00'
        friday:
          - start: '09:00'
            end: '17:00'
        saturday: []
        sunday: []
