  /me/stylist/appointments:
    get:
      summary: Get stylist appointments
      description: Retrieves appointments for the authenticated stylist. Returns appointments where the user is the stylist.
      security:
        - cookieAuth: []
      parameters:
        - name: start_date
          in: query
          schema:
            type: string
            format: date
          description: Filter appointments starting from this date (inclusive). Format YYYY-MM-DD.
        - name: end_date
          in: query
          schema:
            type: string
            format: date
          description: Filter appointments ending on or before this date (inclusive). Format YYYY-MM-DD.
        - name: status
          in: query
          schema:
            type: array
            items:
              type: string
              enum:
                - requested
                - confirmed
                - completed
                - completed_auto
                - canceled_by_client
                - canceled_by_stylist
                - expired
                - no_show_client
                - no_show_stylist
          description: Filter by appointment status.
        - name: sort_by
          in: query
          schema:
            type: string
            enum:
              - start_time
              - end_time
            default: start_time
          description: Field to sort the results by.
        - name: sort_order
          in: query
          schema:
            type: string
            enum:
              - asc
              - desc
            default: asc
          description: Sort order (ascending or descending).
        - name: page
          in: query
          schema:
            type: integer
            minimum: 1
            default: 1
          description: Page number for pagination.
        - name: page_size
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 10
          description: Number of items per page.
      responses:
        '200':
          description: Appointments retrieved successfully.
          content:
            application/json:
              schema:
                properties:
                  meta:
                    $ref: '#/components/schemas/MetaResponse'
                  links:
                    $ref: '#/components/schemas/LinksResponse'
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/AppointmentResponse'
        '400':
          description: User is not a stylist.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /stylists:
    get:
      summary: Search for stylists
      description: Search for stylists based on filters such as type, specialties, and location.
      parameters:
        - name: type
          in: query
          schema:
            type: array
            items:
              type: string
          description: Filter by stylist type(s). Valid values are the slugs returned by GET /stylist-types.
        - name: services
          in: query
          schema:
            type: array
            items:
              type: string
          description: Filter by specific service slugs for precise matching (e.g., "basic-mens-haircut", "balayage-ombre")
        - name: specialties
          in: query
          schema:
            type: array
            items:
              type: string
          description: Filter by stylist specialties (e.g., "bridal", "men's grooming", "curly hair")
        - name: min_rating
          in: query
          schema:
            type: number
            format: double
            minimum: 1
            maximum: 5
          description: Minimum average rating (0-5 stars)
        - name: min_experience_years
          in: query
          schema:
            type: integer
            minimum: 0
          description: Minimum years of experience
        - name: min_base_price
          in: query
          schema:
            type: number
            format: double
            minimum: 0
          description: Minimum base service price
        - name: max_base_price
          in: query
          schema:
            type: number
            format: double
            minimum: 0
          description: Maximum base service price
        - name: sort_by
          in: query
          schema:
            type: string
            enum:
              - relevance
              - rating
              - price_low_to_high
              - price_high_to_low
              - experience
              - review_count
              - newest
            default: relevance
          description: Field to sort results by
        - name: sort_order
          in: query
          schema:
            type: string
            enum:
              - asc
              - desc
            default: desc
          description: Sort order (ascending or descending)
        - name: page
          in: query
          schema:
            type: integer
            minimum: 1
            default: 1
          description: Page number for pagination
        - name: page_size
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
          description: Number of results per page
        - name: q
          in: query
          schema:
            type: string
          description: Text search query for stylist names, descriptions, or services
      responses:
        '200':
          description: List of stylists matching the search criteria.
          content:
            application/json:
              schema:
                type: object
                properties:
                  meta:
                    $ref: '#/components/schemas/MetaResponse'
                  links:
                    $ref: '#/components/schemas/LinksResponse'
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/StylistSearchResponse'
        '500':
          description: Internal server error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
