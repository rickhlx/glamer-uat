        - name: itemId
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: The ID of the cart item.
        - name: session_id
          in: query
          schema:
            type: string
          description: Session ID for guest cart access.
      requestBody:
        required: true
        content:
          application/json:
            schema:
