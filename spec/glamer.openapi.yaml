      security:
        - cookieAuth: []
        - {}
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: The ID of the cart.
        - name: itemId
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: The ID of the cart item.
        - name: session_id
          in: query
          schema:
            type: string
          description: Session ID for guest cart access.
      responses:
