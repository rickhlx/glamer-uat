          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized - guest carts cannot be checked out.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Cart not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Cart cannot be checked out (empty, expired, etc.).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /services:
    get:
      summary: List services
      description: Get all available services from the service catalog for the given stylist type.
      security:
        - cookieAuth: []
        - {}
      parameters:
        - name: type
          in: query
          required: false
          schema:
            type: string
          description: Stylist type slug (e.g. barber, stylist, nail-technician). When authenticated as a stylist, defaults to that stylist's type.
      responses:
        '200':
          description: Services retrieved successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/CatalogServiceResponse'
        '400':
          description: Missing or invalid type parameter
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /addons:
    get:
      summary: List addons
      description: Returns available addon slugs for the given stylist type.
      security:
        - cookieAuth: []
        - {}
      parameters:
        - name: type
          in: query
          required: false
          schema:
            type: string
          description: Stylist type slug (e.g. barber, stylist, nail-technician). When authenticated as a stylist, defaults to that stylist's type.
      responses:
        '200':
          description: Addons retrieved successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/AddonResponse'
        '400':
          description: Missing or invalid type parameter
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /specialties:
    get:
      summary: List specialties
      description: Returns the specialty catalog (slug + name) for the given stylist type.
      security:
        - cookieAuth: []
        - {}
      parameters:
        - name: type
          in: query
          required: false
          schema:
            type: string
          description: Stylist type slug (e.g. barber, stylist, nail-technician). When authenticated as a stylist, defaults to that stylist's type.
      responses:
        '200':
          description: Specialties retrieved successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/SpecialtyResponse'
        '400':
          description: Missing or invalid type parameter
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /locations:
    post:
      summary: Create a new location
      description: Creates a new business location.
      security:
        - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LocationRequest'
      responses:
        '201':
          description: Location created successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LocationResponse'
        '400':
          description: Bad request.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /stylist-types:
    get:
      summary: List stylist types
      description: Returns all registered stylist profession types (e.g. barber, stylist, nail-technician).
      responses:
        '200':
          description: Stylist types retrieved successfully
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/StylistTypeResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /invites/{code}:
    get:
      summary: Validate stylist invite code
      description: Validates if a stylist invite code is valid and can be used.
      security:
        - cookieAuth: []
      parameters:
        - name: code
          in: path
          required: true
          schema:
            type: string
          description: The invite code to validate
      responses:
        '200':
          description: Invite code validation result
          content:
            application/json:
              schema:
                type: object
                properties:
                  valid:
                    type: boolean
                    description: Whether the invite code is valid
                  code:
                    type: string
                    description: The invite code
                  expires_at:
                    type: integer
                    format: int64
                    description: Unix timestamp when the invite expires
                  message:
                    type: string
                    description: Additional message about the validation result
                required:
                  - valid
        '400':
          description: Bad request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    post:
      summary: Use stylist invite code
      description: Uses a stylist invite code to convert the authenticated user to a stylist.
      security:
        - cookieAuth: []
      parameters:
        - name: code
          in: path
          required: true
          schema:
            type: string
          description: The invite code to use
      responses:
        '200':
          description: Invite code used successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    description: Whether the operation was successful
                  message:
                    type: string
                    description: Success message
                required:
                  - success
                  - message
        '400':
          description: Bad request (invalid code, expired, etc.)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized (user not authenticated)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Invite code not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
components:
  securitySchemes:
    cookieAuth:
      type: apiKey
      in: cookie
      name: glamer-session
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  parameters:
    TimezoneHeader:
      name: X-Timezone
      in: header
      required: false
      description: |
        IANA timezone identifier for response time formatting.
        If not provided, falls back to the user's stored timezone preference,
        or UTC if no preference is set.
      schema:
        type: string
        example: America/New_York
  schemas:
    SessionResponse:
      type: object
      required:
        - session
        - expires
      properties:
        session:
          type: string
          description: The generated session cookie.
          example: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...
        expires:
          type: number
          format: double
          description: Expiration time of the session cookie in seconds.
          example: 432000
    ErrorResponse:
      type: object
      properties:
        message:
          type: string
          description: Error message.
          example: bad request
    UserResponse:
      type: object
      required:
        - displayName
        - role
        - timezone
      properties:
        displayName:
          type: string
          description: User's display name.
        email:
          type: string
          description: User's email address.
          format: email
        avatarUrl:
          type: string
          description: URL of the user's avatar image.
          format: uri
        role:
          type: string
          description: User's role (e.g., stylist, client).
          enum:
            - client
            - stylist
            - admin
        timezone:
          type: string
          description: IANA timezone identifier (e.g., "America/New_York", "UTC").
          example: America/New_York
    UserRequest:
      type: object
      required:
        - displayName
      properties:
        displayName:
          type: string
          description: User's display name.
        email:
          type: string
          description: User's email address.
          format: email
        avatarUrl:
          type: string
          description: URL of the user's avatar image.
          format: uri
        role:
          type: string
          description: User's type (e.g., stylist, client).
          enum:
            - client
            - stylist
    UserNotificationPreferencesResponse:
      type: object
      required:
        - activity
        - marketing
      properties:
        activity:
          type: boolean
          description: Whether to receive activity notifications.
        marketing:
          type: boolean
          description: Whether to receive marketing notifications.
        push:
          type: boolean
          description: Whether to receive iOS push notifications.
    UserNotificationPreferencesRequest:
      type: object
      required:
        - activity
        - marketing
      properties:
        activity:
          type: boolean
          description: Whether to receive activity notifications.
        marketing:
          type: boolean
          description: Whether to receive marketing notifications.
        push:
          type: boolean
          description: Whether to receive iOS push notifications.
    PhoneNumberResponse:
      type: object
      required:
        - phoneNumber
        - verified
      properties:
        phoneNumber:
          type: string
          description: Phone number in E.164 format.
          example: '+14155552671'
        verified:
          type: boolean
          description: Whether the phone number has been verified via SMS OTP.
    PhoneNumberCreateRequest:
      type: object
      required:
        - phoneNumber
      properties:
        phoneNumber:
          type: string
          description: Phone number in E.164 format (e.g., +14155552671).
          pattern: ^\+[1-9]\d{1,14}$
          example: '+14155552671'
        verified:
          type: boolean
          description: Phone number validation status
    UpdateTimezoneRequest:
      type: object
      required:
        - timezone
      properties:
        timezone:
          type: string
          description: IANA timezone identifier (e.g., "America/New_York", "Europe/London", "UTC").
          example: America/New_York
    MetaResponse:
      properties:
        page:
          type: integer
          description: Current page number.
          example: 1
        pageSize:
          type: integer
          description: Number of items per page.
          example: 10
        totalPages:
          type: integer
          description: Total number of pages.
          example: 10
        totalItems:
          type: integer
          description: Total number of items.
          example: 100
    LinksResponse:
      type: object
      properties:
        self:
          type: string
          description: URL of the current page.
        next:
          type: string
          description: URL of the next page.
        prev:
          type: string
          description: URL of the previous page.
    NotificationResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
          description: Unique identifier for the notification.
        createdAt:
          type: string
          format: date-time
          description: Timestamp when the notification was created.
        type:
          type: string
          description: Type of the notification.
        action:
          type: string
          description: Action associated with the notification.
        target:
          type: string
          description: Target of the notification.
        isRead:
          type: boolean
          description: Whether the notification has been read.
    ServiceLocationType:
      type: string
      enum:
        - at_stylist
        - at_client
      description: Whether a service takes place at the stylist's business location (at_stylist) or at the client's location (at_client, travel booking).
    ClientResponse:
      type: object
      required:
        - displayName
      properties:
        displayName:
          type: string
          description: User displayname
    AppointmentResponse:
      type: object
      required:
        - id
        - username
        - services
        - startTime
        - endTime
        - status
        - stylistDisplayName
        - totalPriceCents
        - totalDurationMinutes
        - paymentStatus
      properties:
        id:
          type: string
          format: uuid
          description: Unique identifier for the appointment.
        username:
          type: string
          description: Username of the stylist.
        services:
          type: array
          description: List of services booked for this appointment.
          items:
            type: object
            required:
              - id
              - slug
              - name
              - priceCents
              - durationMinutes
            properties:
              id:
                type: string
                format: uuid
                description: Unique identifier for the service.
              slug:
                type: string
                description: Unique slug identifier for the service.
                example: basic-mens-haircut
              name:
                type: string
                description: Display name of the service.
              priceCents:
                type: integer
                description: Price of the service in cents at booking time.
              durationMinutes:
                type: integer
                description: Duration of the service in minutes at booking time.
              category:
                type: string
                description: Category of the service.
              includedAddons:
                type: array
                items:
                  type: string
                description: Addon slugs included with service at booking time
                example:
                  - wash
                  - blow-dry
        totalPriceCents:
          type: integer
          description: Total price of all services in cents.
        totalDurationMinutes:
          type: integer
          description: Total duration of all services in minutes.
        startTime:
          type: string
          format: date-time
          description: Start time of the appointment.
          example: '2023-10-01T10:00:00Z'
        endTime:
          type: string
          format: date-time
          description: End time of the appointment.
          example: '2023-10-01T11:00:00Z'
        status:
          type: string
          description: Status of the appointment in the booking lifecycle.
          enum:
            - requested
            - confirmed
            - completed
            - completed_auto
            - canceled_by_client
            - canceled_by_stylist
            - expired
            - no_show_client
            - no_show_stylist
        stylistAvatar:
          type: string
          description: URL of the stylist's avatar image.
          format: uri
        stylistDisplayName:
          type: string
          description: Display name of the stylist.
        clientDisplayName:
          type: string
          description: Display name of the client.
        locationType:
          $ref: '#/components/schemas/ServiceLocationType'
        locationName:
          type: string
          description: Name of the location where the service is provided.
        locationAddress:
          type: string
          description: Address of the location where the service is provided (or client-supplied address for at_client).
        cartId:
          type: string
          format: uuid
          description: ID of the cart that was used to create this appointment (if any).
        paymentStatus:
          type: string
          enum:
            - unpaid
            - authorized
            - captured
            - refunded
            - partial_refund
          description: Payment status of the appointment.
          example: unpaid
        capturedAt:
          type: string
          format: date-time
          description: Timestamp when the appointment snapshot was captured.
        cancellationReason:
          type: string
          nullable: true
          description: Reason for cancellation (for canceled_by_stylist, canceled_by_client, or expired statuses).
        client:
          $ref: '#/components/schemas/ClientResponse'
          description: Client information for the appointment.
    DeviceTokenRequest:
      type: object
      required:
        - token
        - platform
      properties:
        token:
          type: string
          description: FCM registration token from the iOS app.
        platform:
          type: string
          description: Device platform.
          enum:
            - ios
          example: ios
    PresignUploadRequest:
      type: object
      required:
        - content_type
      properties:
        content_type:
          type: string
          description: MIME type of the file to upload (e.g. image/jpeg)
          example: image/jpeg
        filename:
          type: string
          description: Original filename; used only to derive the object extension
          example: portfolio.jpg
        file_size:
          type: integer
          format: int64
          minimum: 1
          description: Optional file size in bytes; validated against the upload limit when provided
          example: 524288
    PresignUploadResponse:
      type: object
      required:
        - upload_url
        - method
        - object_key
        - public_url
        - expires_at
      properties:
        upload_url:
          type: string
          format: uri
          description: Presigned URL the client uploads the file to
        method:
          type: string
          description: HTTP method to use for the upload
          example: PUT
        object_key:
          type: string
          description: Storage object key for the uploaded file
          example: portfolio/123e4567-e89b-12d3-a456-426614174000/abc123.jpg
        public_url:
          type: string
          format: uri
          description: Public URL of the uploaded object; pass this as storage_url when registering a portfolio photo
        expires_at:
          type: string
          format: date-time
          description: Time at which the presigned URL expires
    ReviewResponse:
      type: object
      required:
        - id
        - createdAt
        - bookingId
        - rating
        - comment
        - author
        - stylistUsername
        - stylistDisplayName
        - author
      properties:
        id:
          type: string
          description: Unique identifier for the review.
          format: uuid
        createdAt:
          type: string
          format: date-time
          description: Timestamp when the review was created.
        updatedAt:
          type: string
          format: date-time
          description: Timestamp when the review was last updated.
        repliedAt:
          type: string
          format: date-time
          description: Timestamp when the stylist replied to the review.
        bookingId:
          type: string
          format: uuid
          description: ID of the appointment associated with the review.
        stylistUsername:
          type: string
          description: Username of the stylist being reviewed.
        stylistDisplayName:
          type: string
          description: Display name of the stylist being reviewed.
        stylistAvatar:
          type: string
          description: URL of the stylist's avatar image.
          format: uri
        replyComment:
          type: string
          description: Reply comment from the stylist (if any).
          example: Thank you for your feedback!
        rating:
          type: integer
          description: Rating for the stylist.
          example: 5
        comment:
          type: string
          description: Review comment.
          example: Excellent service!
        author:
          type: string
          description: Author of the review.
          example: John Doe
        authorAvatarUrl:
          type: string
          description: URL of the author's avatar image.
          format: uri
    OnboardingSteps:
      type: object
      description: Derived per-step readiness of the stylist's onboarding. Each flag is recomputed from current profile state on every request; clients can use it to resume a half-finished onboarding flow at the right step. Distinct from onboardingCompleted, which is the persisted completion flag.
      required:
        - profileBasics
        - type
        - availability
        - firstService
      properties:
        profileBasics:
          type: boolean
          description: True when bio and years of experience are set.
        type:
          type: boolean
          description: True when the stylist has chosen a profession type.
        availability:
          type: boolean
          description: True when a non-empty weekly availability is configured.
        firstService:
          type: boolean
          description: True when the stylist has at least one service.
