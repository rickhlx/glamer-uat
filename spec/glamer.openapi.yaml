          type: string
          description: Stylist display name.
        avatarUrl:
          type: string
          format: uri
          description: Stylist avatar URL.
        username:
          type: string
          description: Stylist username.
    CartLocationSnapshot:
      type: object
      required:
        - address
      properties:
        id:
          type: string
          format: uuid
          description: Location ID. Absent for at_client (travel) carts.
        name:
          type: string
          description: Location name. Absent for at_client (travel) carts.
        address:
          type: string
          description: Location address (business address for at_stylist; client-supplied address for at_client).
    CartPromotionSnapshot:
      type: object
      required:
        - code
        - type
        - value
        - appliesTo
        - capturedAt
      properties:
        code:
          type: string
          description: Promotion code.
          example: FALL24
        type:
          type: string
          enum:
            - percentage
            - flat
            - bogo
          description: Type of promotion.
        value:
          type: number
          format: double
          description: Promotion value (percentage or flat amount).
          example: 10
        appliesTo:
          type: array
          items:
            type: string
            enum:
              - service
              - cart
          description: Scope where the promotion applies.
        capturedAt:
          type: string
          format: date-time
          description: Timestamp when the promotion snapshot was captured.
    CartResponse:
      type: object
      required:
        - id
        - status
        - createdAt
        - updatedAt
        - expiresAt
        - totalItems
        - totalPrice
        - currency
      properties:
        id:
          type: string
          format: uuid
          description: Unique identifier for the cart.
        userId:
          type: string
          format: uuid
          description: ID of the user who owns the cart (null for guest carts).
        sessionId:
          type: string
          description: Session ID for guest carts (null for authenticated carts).
        status:
          type: string
          enum:
            - active
            - abandoned
            - checked_out
          description: Current status of the cart.
        createdAt:
          type: string
          format: date-time
          description: Timestamp when the cart was created.
        updatedAt:
          type: string
          format: date-time
          description: Timestamp when the cart was last updated.
        abandonedAt:
          type: string
          format: date-time
          description: Timestamp when the cart was abandoned (if applicable).
        checkedOutAt:
          type: string
          format: date-time
          description: Timestamp when the cart was checked out (if applicable).
        expiresAt:
          type: string
          format: date-time
          description: Timestamp when the cart expires.
        totalItems:
          type: integer
          description: Total number of items in the cart.
        totalPrice:
          type: integer
          description: Total price of all items in cents.
        currency:
          type: string
          default: USD
          description: Currency code for the cart total.
        preferredStartTime:
          type: string
          format: date-time
          description: Preferred start time for all appointments in the cart.
        metadata:
          type: object
          additionalProperties: true
          description: Additional metadata for the cart.
        items:
          type: array
          items:
            $ref: '#/components/schemas/CartItemResponse'
          description: List of items in the cart.
        stylistUsername:
          type: string
          description: Username of the stylist providing service
        notes:
          type: string
          description: Updated notes or preferences for the service.
        stylist:
          $ref: '#/components/schemas/CartStylistSnapshot'
        location:
          $ref: '#/components/schemas/CartLocationSnapshot'
        promotionSnapshot:
          $ref: '#/components/schemas/CartPromotionSnapshot'
    CartCreateRequest:
      required:
        - stylistUsername
      type: object
      properties:
        stylistUsername:
          type: string
          description: Username of the stylist providing service
        locationType:
          $ref: '#/components/schemas/ServiceLocationType'
        travelAddress:
          type: object
          description: Client-supplied address for at_client carts. Required when locationType is at_client.
          required:
            - line1
            - city
            - state
            - postalCode
            - country
          properties:
            line1:
              type: string
            line2:
              type: string
            city:
              type: string
            state:
              type: string
            postalCode:
              type: string
            country:
              type: string
              example: US
    CartMergeRequest:
      type: object
      required:
        - sessionId
      properties:
        sessionId:
          type: string
          description: Session ID of the guest cart to merge with the authenticated user.
    CartUpdateRequest:
      type: object
      properties:
        preferredStartTime:
          type: string
          format: date-time
          description: Preferred start time for all appointments in the cart.
        metadata:
          type: object
          additionalProperties: true
          description: Additional metadata for the cart.
        stylistUsername:
          type: string
          description: Username of the stylist providing service
        notes:
          type: string
          description: Additional notes or preferences for the service.
    CartItemCreateRequest:
      type: object
      required:
        - serviceId
      properties:
        serviceId:
          type: string
          format: uuid
          description: ID of the service being added to cart.
    CartItemUpdateRequest:
      type: object
    CartCheckoutRequest:
      type: object
      properties:
        paymentMethod:
          type: string
          description: Payment method for the checkout (future use).
        notes:
          type: string
          description: Additional notes for the checkout.
    CartCheckoutResponse:
      type: object
      required:
        - cartId
        - appointmentId
        - totalPrice
        - currency
      properties:
        cartId:
          type: string
          format: uuid
          description: ID of the checked out cart.
        appointmentId:
          type: string
          format: uuid
          description: ID of the created appointment.
        totalPrice:
          type: integer
          description: Total price of all appointments in cents.
        currency:
          type: string
          description: Currency code for the total price.
        checkedOutAt:
          type: string
          format: date-time
          description: Timestamp when the checkout was completed.
    CatalogServiceResponse:
      type: object
      required:
        - id
        - slug
        - name
        - description
        - category
      properties:
        id:
          type: string
          format: uuid
          description: Unique identifier for the service.
        slug:
          type: string
          description: Slug for the service, used in URLs.
        name:
          type: string
          description: Name of the service.
        description:
          type: string
          description: Description of the service.
        category:
          type: string
          description: Grouping label for UI organization (e.g. "Manicure", "Pedicure", "Haircuts").
    AddonResponse:
      type: object
      required:
        - slug
        - name
      properties:
        slug:
          type: string
          description: Addon identifier slug (e.g. wash, blow-dry)
        name:
          type: string
          description: Human-readable addon name
    SpecialtyResponse:
      type: object
      required:
        - slug
        - name
      properties:
        slug:
          type: string
          description: Specialty identifier slug (e.g. colorist, balayage)
        name:
          type: string
          description: Human-readable specialty name
    LocationRequest:
      type: object
      required:
        - name
        - addressLine1
        - city
        - state
        - postalCode
      properties:
        name:
          type: string
          description: Name of the location.
        addressLine1:
          type: string
          description: First line of the address.
        addressLine2:
          type: string
          description: Second line of the address (optional).
        city:
          type: string
          description: City of the location.
        state:
          type: string
          description: State or region of the location.
        postalCode:
          type: string
          description: Postal code of the location.
        phoneNumber:
          type: string
          description: Phone number of the location.
        website:
          type: string
          format: uri
          description: Website URL of the location.
        email:
          type: string
          format: email
          description: Email address of the location.
    StylistTypeResponse:
      type: object
      required:
        - slug
        - name
      properties:
        slug:
          type: string
          description: URL-safe identifier for the stylist type (e.g. barber, stylist, nail-technician).
          example: nail-technician
        name:
          type: string
          description: Human-readable display name.
          example: Nail Technician
