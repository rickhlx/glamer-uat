name: UAT

on:
  push:
  pull_request:
  schedule:
    # Nightly run against UAT (08:00 UTC).
    - cron: '0 8 * * *'
  workflow_dispatch:

concurrency:
  group: uat-${{ github.ref }}
  cancel-in-progress: true

jobs:
  uat:
    runs-on: ubuntu-latest
    env:
      API_BASE_URL: ${{ secrets.API_BASE_URL }}
      WEB_BASE_URL: ${{ secrets.WEB_BASE_URL }}
      TEST_CLIENT_EMAIL: ${{ secrets.TEST_CLIENT_EMAIL }}
      TEST_CLIENT_PASSWORD: ${{ secrets.TEST_CLIENT_PASSWORD }}
      TEST_STYLIST_EMAIL: ${{ secrets.TEST_STYLIST_EMAIL }}
      TEST_STYLIST_PASSWORD: ${{ secrets.TEST_STYLIST_PASSWORD }}
      SEED_URL: ${{ secrets.SEED_URL }}
      SEED_TOKEN: ${{ secrets.SEED_TOKEN }}
      TEST_CARD_DECLINE: ${{ secrets.TEST_CARD_DECLINE }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Generate API types from the OpenAPI spec
        run: pnpm gen:types

      - name: Typecheck
        run: pnpm typecheck

      - name: Install Playwright browser
        run: pnpm exec playwright install --with-deps chromium

      # Gate: critical journeys must pass. (Skips itself until real UAT URLs are set.)
      - name: Run critical journeys (release gate)
        run: pnpm test:critical

      # Full suite for visibility (non-gating extras are @important).
      - name: Run full suite
        if: ${{ !cancelled() }}
        run: pnpm test

      - name: Upload report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            playwright-report/
            test-results/
          retention-days: 14
